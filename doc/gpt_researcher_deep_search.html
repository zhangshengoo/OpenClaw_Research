<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT-Researcher 深度检索架构</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #0a0e1a;
  --cyan: #22d3ee;
  --blue: #3b82f6;
  --purple: #a78bfa;
  --emerald: #34d399;
  --amber: #fbbf24;
  --rose: #fb7185;
  --text: #e2e8f0;
  --muted: #94a3b8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans SC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 60% 45% at 25% 25%, rgba(34,211,238,.06), transparent),
              radial-gradient(ellipse 50% 50% at 75% 70%, rgba(167,139,250,.05), transparent);
}

.diagram {
  position:relative; z-index:1; width:1020px; padding:44px 36px 40px;
  background:rgba(12,18,36,.92); border:1px solid rgba(34,211,238,.12);
  border-radius:20px; backdrop-filter:blur(12px);
  box-shadow: 0 0 80px rgba(34,211,238,.04), 0 24px 64px rgba(0,0,0,.5);
}
.diagram::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:20px 20px 0 0;
  background:linear-gradient(90deg, transparent 5%, var(--cyan), var(--blue), var(--purple), transparent 95%);
}

.title { text-align:center; margin-bottom:32px; }
.title h1 {
  font-size:1.6rem; font-weight:900;
  background:linear-gradient(135deg,var(--cyan),var(--blue),var(--purple));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.title p { font-family:'JetBrains Mono',monospace; font-size:.76rem; color:var(--muted); margin-top:4px; }
.title code { background:rgba(34,211,238,.1); padding:2px 7px; border-radius:4px; color:var(--cyan); font-size:.72rem; }

svg { display:block; margin:0 auto; }
svg text { font-family:'Noto Sans SC',sans-serif; }
svg .mono { font-family:'JetBrains Mono',monospace; }

@keyframes dash { to { stroke-dashoffset:-16; } }
.anim-dash { stroke-dasharray:6,4; animation:dash 1.2s linear infinite; }
.anim-dash-slow { stroke-dasharray:8,5; animation:dash 2s linear infinite; }

.tip {
  position:fixed; background:rgba(10,14,26,.97); border:1px solid rgba(34,211,238,.25);
  border-radius:8px; padding:10px 14px; font-size:.72rem; color:var(--text);
  max-width:250px; pointer-events:none; opacity:0; transition:opacity .15s;
  z-index:1000; line-height:1.5; box-shadow:0 6px 20px rgba(0,0,0,.5);
}
.tip.on { opacity:1; }
.tip code { font-family:'JetBrains Mono',monospace; font-size:.64rem; background:rgba(34,211,238,.12); padding:1px 4px; border-radius:3px; color:var(--cyan); }

@media(max-width:1060px){ .diagram{width:96vw;padding:28px 16px;} svg{width:100%;height:auto;} }
</style>
</head>
<body>

<div class="diagram">
  <div class="title">
    <h1>GPT-Researcher 深度检索架构</h1>
    <p>DeepResearchSkill — 递归广度×深度搜索树 &nbsp;|&nbsp; <code>breadth=4 · depth=2 · Semaphore并发</code></p>
  </div>

  <svg viewBox="0 0 950 580" width="950" height="580">
    <defs>
      <marker id="a-cyan" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#22d3ee"/></marker>
      <marker id="a-blue" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#3b82f6"/></marker>
      <marker id="a-purple" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#a78bfa"/></marker>
      <marker id="a-emerald" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#34d399"/></marker>
      <marker id="a-amber" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#fbbf24"/></marker>
      <filter id="g-cyan"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    <!-- ===== LEFT: SEARCH TREE ===== -->

    <!-- Depth label column -->
    <text x="28" y="68" fill="#94a3b8" font-size="9" class="mono" text-anchor="middle">Depth 0</text>
    <text x="28" y="198" fill="#94a3b8" font-size="9" class="mono" text-anchor="middle">Depth 1</text>
    <text x="28" y="198" fill="#94a3b8" font-size="8" class="mono" text-anchor="middle" dy="12">breadth=4</text>
    <text x="28" y="348" fill="#94a3b8" font-size="9" class="mono" text-anchor="middle">Depth 2</text>
    <text x="28" y="348" fill="#94a3b8" font-size="8" class="mono" text-anchor="middle" dy="12">breadth=2</text>

    <!-- ROOT NODE -->
    <g data-tip="用户输入原始研究查询<br>Strategic LLM 生成研究计划<br><code>generate_research_plan()</code>" cursor="pointer">
      <rect x="200" y="38" width="180" height="52" rx="12" fill="rgba(34,211,238,.12)" stroke="rgba(34,211,238,.5)" stroke-width="1.5" filter="url(#g-cyan)"/>
      <text x="290" y="62" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700">🔬 原始查询</text>
      <text x="290" y="80" text-anchor="middle" fill="#94a3b8" font-size="9" class="mono">breadth=4, depth=2</text>
    </g>

    <!-- Root → Depth1 lines -->
    <line x1="220" y1="90" x2="120" y2="168" stroke="rgba(59,130,246,.3)" stroke-width="1.2" class="anim-dash"/>
    <line x1="260" y1="90" x2="220" y2="168" stroke="rgba(59,130,246,.3)" stroke-width="1.2" class="anim-dash"/>
    <line x1="320" y1="90" x2="340" y2="168" stroke="rgba(59,130,246,.3)" stroke-width="1.2" class="anim-dash"/>
    <line x1="360" y1="90" x2="460" y2="168" stroke="rgba(59,130,246,.3)" stroke-width="1.2" class="anim-dash"/>

    <!-- Label: LLM派生 -->
    <text x="290" y="124" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="600">▼ LLM 自动派生 4 个子查询</text>

    <!-- DEPTH 1 NODES -->
    <g data-tip="独立 GPTResearcher 实例<br>完整执行: 搜索→抓取→提炼<br><code>Semaphore(2)</code> 并发控制" cursor="pointer">
      <rect x="60" y="168" width="110" height="48" rx="10" fill="rgba(59,130,246,.1)" stroke="rgba(59,130,246,.4)" stroke-width="1"/>
      <text x="115" y="190" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="600">🔎 子查询 A</text>
      <text x="115" y="206" text-anchor="middle" fill="#94a3b8" font-size="8" class="mono">Semaphore(2)</text>
    </g>
    <g data-tip="并行执行，受 Semaphore 限制<br>每个实例独立维护 visited_urls<br>结果含 learnings + citations" cursor="pointer">
      <rect x="180" y="168" width="110" height="48" rx="10" fill="rgba(59,130,246,.1)" stroke="rgba(59,130,246,.4)" stroke-width="1"/>
      <text x="235" y="190" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="600">🔎 子查询 B</text>

      <text x="355" y="190" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="600">🔎 子查询 C</text>
      <text x="355" y="206" text-anchor="middle" fill="#94a3b8" font-size="8" class="mono">独立实例</text>
    </g>
    <g data-tip="处理完成后提取 learnings<br>生成 follow-up questions<br>决定是否递归深入" cursor="pointer">

      <text x="475" y="190" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="600">🔎 子查询 D</text>

    <line x1="340" y1="216" x2="380" y2="278" stroke="rgba(167,139,250,.25)" stroke-width="1" class="anim-dash"/>
    <line x1="370" y1="216" x2="450" y2="278" stroke="rgba(167,139,250,.25)" stroke-width="1" class="anim-dash"/>

    <!-- DEPTH 2 NODES (smaller) -->
    <g data-tip="基于 A 的 follow-up 生成<br>广度减半为 2<br>递归终止: depth=0" cursor="pointer">
      <rect x="50" y="278" width="72" height="36" rx="8" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.35)" stroke-width="1"/>
      <text x="86" y="300" text-anchor="middle" fill="#a78bfa" font-size="10">🔍 A-1</text>
    </g>
    <g data-tip="每层递归创建新实例<br>累积所有 learnings<br>去重合并 visited_urls" cursor="pointer">
      <rect x="132" y="278" width="72" height="36" rx="8" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.35)" stroke-width="1"/>
      <text x="168" y="300" text-anchor="middle" fill="#a78bfa" font-size="10">🔍 A-2</text>
    </g>
    <g cursor="pointer" data-tip="B 的后续研究<br>独立并发执行">
      <rect x="214" y="278" width="72" height="36" rx="8" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.35)" stroke-width="1"/>
      <text x="250" y="300" text-anchor="middle" fill="#a78bfa" font-size="10">🔍 B-1</text>
    </g>
    <g cursor="pointer" data-tip="B 的后续研究<br>结果向上传播">
      <rect x="296" y="278" width="72" height="36" rx="8" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.35)" stroke-width="1"/>
      <text x="332" y="300" text-anchor="middle" fill="#a78bfa" font-size="10">🔍 B-2</text>
    </g>
    <g cursor="pointer" data-tip="C 的后续研究">
      <rect x="378" y="278" width="72" height="36" rx="8" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.35)" stroke-width="1"/>
      <text x="414" y="300" text-anchor="middle" fill="#a78bfa" font-size="10">🔍 C-1</text>
    </g>
    <g cursor="pointer" data-tip="D 的后续研究<br>此层结束后合并所有结果<br><code>trim_context_to_word_limit()</code>">
      <rect x="460" y="278" width="72" height="36" rx="8" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.35)" stroke-width="1"/>
      <text x="496" y="300" text-anchor="middle" fill="#a78bfa" font-size="10">🔍 D-1</text>
    </g>

    <!-- Result merge arrow -->
    <text x="290" y="342" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">▲ 结果逐层向上汇聚</text>

    <!-- ===== RIGHT: SINGLE NODE FLOW ===== -->

    <!-- Flow panel background -->
    <rect x="575" y="30" width="355" height="340" rx="14" fill="rgba(255,255,255,.02)" stroke="rgba(34,211,238,.12)" stroke-width="1"/>
    <text x="752" y="55" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">单节点执行流程（自主闭环）</text>

    <!-- Step 1: 生成子查询 -->
    <g data-tip="Strategic LLM 分析当前问题<br>生成 N 个搜索查询 + 研究目标<br><code>generate_search_queries()</code>" cursor="pointer">

      <text x="640" y="97" fill="#22d3ee" font-size="12" font-weight="600">❓ 生成子查询</text>
      <text x="880" y="97" text-anchor="end" fill="#94a3b8" font-size="8" class="mono">generate_search_queries()</text>

    <!-- Step 2: 并发检索 -->
    <g data-tip="Semaphore 控制并发（默认2）<br>每个查询创建独立 GPTResearcher<br>完整执行: 搜索→抓取→提炼" cursor="pointer">
      <rect x="610" y="130" width="280" height="42" rx="9" fill="rgba(59,130,246,.08)" stroke="rgba(59,130,246,.3)" stroke-width="1"/>
      <text x="640" y="155" fill="#3b82f6" font-size="12" font-weight="600">🌐 Semaphore 并发检索</text>
      <text x="880" y="155" text-anchor="end" fill="#94a3b8" font-size="8" class="mono">Semaphore(2)</text>
    </g>
    <line x1="752" y1="172" x2="752" y2="186" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#a-blue)" class="anim-dash"/>

    <!-- Step 3: 要点提取 -->
    <g data-tip="提取结构化 learnings[]<br>关联源 URL → citations{}<br><code>process_research_results()</code>" cursor="pointer">

      <text x="640" y="213" fill="#a78bfa" font-size="12" font-weight="600">🧠 要点提取 + 引用溯源</text>
      <text x="880" y="213" text-anchor="end" fill="#94a3b8" font-size="8" class="mono">learnings[] citations{}</text>

    <!-- Step 4: 递归深入 -->
    <g data-tip="生成 follow-up 问题<br>广度减半: max(2, breadth//2)<br>depth-1 递归调用自身<br><code>deep_research(depth-1)</code>" cursor="pointer">
      <rect x="610" y="246" width="280" height="42" rx="9" fill="rgba(52,211,153,.08)" stroke="rgba(52,211,153,.3)" stroke-width="1"/>
      <text x="640" y="271" fill="#34d399" font-size="12" font-weight="600">🔄 递归深入 (depth-1)</text>
      <text x="880" y="271" text-anchor="end" fill="#94a3b8" font-size="8" class="mono">breadth = max(2, b//2)</text>
    </g>
    <line x1="752" y1="288" x2="752" y2="302" stroke="#34d399" stroke-width="1.2" marker-end="url(#a-emerald)" class="anim-dash"/>

      <rect x="50" y="458" width="163" height="52" rx="8" fill="rgba(34,211,238,.05)" stroke="rgba(34,211,238,.18)" stroke-width="1"/>
      <text x="131" y="478" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="700">递归广度×深度树</text>

<div class="tip" id="tip"></div>
<script>
const t=document.getElementById('tip');
document.querySelectorAll('[data-tip]').forEach(el=>{
  el.addEventListener('mouseenter',()=>{t.innerHTML=el.getAttribute('data-tip');t.classList.add('on');});
  el.addEventListener('mousemove',e=>{
    t.style.left=Math.min(e.clientX+14,innerWidth-t.offsetWidth-16)+'px';
    t.style.top=Math.min(e.clientY+10,innerHeight-t.offsetHeight-16)+'px';
  });
  el.addEventListener('mouseleave',()=>t.classList.remove('on'));
});
</script>
