# Experiment Plan — generated by Planner agent
# Each iteration defines a config dict passed to run.py via --config JSON

experiment_name: "contextual_biasing_cif_asr"
base_approach: "dual_encoder_faiss_biasing"
dataset: "aishell-1"

iterations:
  - name: "baseline"
    description: "Baseline CIF model without contextual biasing"
    config:
      model_type: "cif_base"
      use_biasing: false
      learning_rate: 0.001
      batch_size: 32
      epochs: 10
      encoder_dim: 256
      decoder_dim: 256

  - name: "add_biasing_naive"
    description: "Add naive attention-based biasing to CIF"
    config:
      model_type: "cif_biased"
      use_biasing: true
      biasing_method: "attention"
      learning_rate: 0.001
      batch_size: 32
      epochs: 10
      encoder_dim: 256
      decoder_dim: 256
      bias_list_size: 100

  - name: "dual_encoder_biasing"
    description: "Replace attention biasing with dual-encoder + FAISS retrieval"
    config:
      model_type: "cif_dual_encoder"
      use_biasing: true
      biasing_method: "dual_encoder_faiss"
      learning_rate: 0.0005
      batch_size: 32
      epochs: 15
      encoder_dim: 256
      decoder_dim: 256
      bias_list_size: 500
      faiss_top_k: 10
      faiss_nprobe: 8

  - name: "lr_schedule_tune"
    description: "Add cosine LR scheduler and increase training"
    config:
      model_type: "cif_dual_encoder"
      use_biasing: true
      biasing_method: "dual_encoder_faiss"
      learning_rate: 0.0003
      lr_scheduler: "cosine"
      warmup_steps: 500
      batch_size: 64
      epochs: 20
      encoder_dim: 512
      decoder_dim: 512
      bias_list_size: 500
      faiss_top_k: 10
      faiss_nprobe: 16
